name: system-integrity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm test
      - name: Verify Coursewerk system index and branch review
        if: github.event_name == 'pull_request'
        run: node scripts/verify_coursewerk.mjs --base origin/${{ github.base_ref }} --require-review
      - name: Verify Coursewerk system index
        if: github.event_name != 'pull_request'
        run: node scripts/verify_coursewerk.mjs --base HEAD
